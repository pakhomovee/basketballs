name: CI

on:
  pull_request:

env:
  PY_LINE_LENGTH: "100"

jobs:
  python-style:
    name: Python Codestyle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python
        run: |
          if [ -f pyproject.toml ] || [ -f ruff.toml ]; then
            ruff check .
          else
            ruff check . --line-length ${PY_LINE_LENGTH}
          fi

      - name: Check Python formatting
        run: ruff format --check .

  frontend-style:
    name: Frontend Codestyle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: components/web/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate SvelteKit types
        run: npx svelte-kit sync

      - name: Type-check (svelte-check)
        run: npm run check

      - name: Check formatting (prettier)
        run: npm run format:check
