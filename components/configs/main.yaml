main:
  # Can be overridden from CLI positional args.
  video_path: null
  output_both: null

  output_2d_path: null

  court_type: "nba" # "nba" | "fiba"
  with_pose: true
  enable_smoothing: true
  no_reid: false
  target_fps: 30

court_detector:
  detection_threshold: 0.25
  smoothness_cost: 200.0
  keypoint_eps: 0.003
  smoothing_num_epochs: 300
  smoothing_lr: 0.001

ball_detector:
  score_threshold: 0.5
  max_disp_ratio: 0.3333333333
  step: 1 # step for wasb ball detector, should be 1 or 3

detector:
  initial_threshold: 0.1
  player_conf_threshold: 0.1
  referee_conf_threshold: 0.25
  number_conf_threshold: 0.25
  ocr_conf_threshold: 0.9

tracker:
  num_tracks: 10
  max_skip: 15
  bbox_scale: 20.0
  w_spatial: 0.2
  w_app: 0.6
  w_iou: 0.2
  w_extended: 1.5
  skip_penalty: 1.0
  detection_reward: 1.0
  enter_cost: 2.0
  exit_cost: 2.0
  edge_margin: 5.0
  k_warmup_frames: 10
  last_frames: 10
  n_passes: 5
  lookback: 5
  oof_entry_cost: 0.5
  w_color: 0.3
  max_occlusion: 45
  occlusion_gate: 50.0
  occlusion_penalty: 0.1
  occlusion_start_pass: 2

actions:
  bbox_expand_ratio: 0.05
  min_expand_px: 3
  other_max_share: 0.35
  min_owner_share: 0.55
  max_pass_gap_seconds: 0.75
  shot_attribution_back_seconds: 0.5
  shot_attribution_forward_seconds: 0.75
  track_number_min_share: 0.8

smoother:
  obs_noise: 0.1
  process_noise_pos: 0.01
  process_noise_vel: 0.1
  max_gap_frames: 20

team_clustering:
  n_clusters: 2
  embedding:
    hue_bins: 12
    saturation_bins: 8
    value_bins: 8
    lab_bins: 12
    min_saturation_for_hue: 40
    torso_center_x: 0.5
    torso_center_y: 0.35
    torso_sigma_x: 0.18
    torso_sigma_y: 0.18
    skin_weight: 0.15

models:
  # Optional override for where model files are stored (default: <repo_root>/models)
  models_dir: null
  court_detection_filename: "court_detection_model.pt"
  court_detection_url: "https://disk.yandex.ru/d/VRabl680FfKBog"
  detector_filename: "detector_model.pt"
  detector_url: "https://disk.yandex.ru/d/KdtL0zaQQlI5fg"
  parseq_filename: "parseq_flex.ckpt"
  parseq_url: "https://disk.yandex.ru/d/QucoCUmnUbLMHw"
  reid_filename: "reid_model.pth"
  reid_url: "https://disk.yandex.ru/d/ss6GcWNW5Y5BiA"
  seg_filename: "seg-model.pt"
  seg_url: "https://disk.yandex.ru/d/dpjzmKkadg-nZg"
  wasb_filename: "wasb_basketball_best.pth.tar"
  wasb_url: "https://disk.yandex.ru/d/JZQN5HEOKOegog"
  shot_detection_filename: "shot_detection_model.pt"
  shot_detection_url: "https://disk.yandex.ru/d/h2kTEC7_I7WsQg"

benchmarks:
  tracking:
    dataset:
      url: "https://disk.yandex.ru/d/k3Y4Jd6q3tzb7g"
      path: "dataset/tracking_benchmark"
  team_clustering:
    dataset:
      url: "https://disk.yandex.ru/d/ZysZXjH19LOt7w"
      path: "dataset/team_clustering_benchmark/ground_truth.json"
    multishot_dataset:
      url: "https://disk.yandex.ru/d/62VTwq6mKOx4RQ"
      path: "dataset/team_clustering_benchmark/multishot"